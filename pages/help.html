<h2>帮助中心</h2>

<div class="help-section">
    <h3>常见问题</h3>

    <h4>1. 如何注册账号？</h4>
    <p>点击导航栏的"注册"链接，填写用户名、密码、邮箱和手机号后提交。</p>

    <h4>2. 如何搜索用户？</h4>
    <p>登录后在首页搜索框输入用户名或邮箱关键词，点击"搜索"按钮。</p>

    <h4>3. 如何上传头像？</h4>
    <p>登录后点击导航栏的"上传头像"，选择图片文件（支持 jpg/png/gif/webp）后上传。</p>

    <h4>4. 如何充值？</h4>
    <p>登录后点击"个人中心"，在充值输入框中输入金额后点击确认充值。</p>

    <h4>5. 忘记密码怎么办？</h4>
    <p>请联系管理员重置密码。管理员邮箱: admin@example.com</p>
</div>

<div class="help-section">
    <h3>联系方式</h3>
    <p>如有其他问题，请发送邮件至 support@example.com</p>
</div>
