{% extends "base.html" %}
{% block title %}登录 - 用户管理系统{% endblock %}

{% block content %}
<div class="card login-card">
    <h2>用户登录</h2>

    {% if error %}
        <div class="{% if is_rate_limit %}warning-message{% else %}error-message{% endif %}">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" action="/login" class="login-form" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="username">用户名</label>
            <input
                type="text"
                id="username"
                name="username"
                class="form-control"
                placeholder="请输入用户名"
                required
                minlength="1"
                maxlength="64"
                autocomplete="username"
                autofocus
            >
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input
                type="password"
                id="password"
                name="password"
                class="form-control"
                placeholder="请输入密码"
                required
                minlength="6"
                maxlength="128"
                autocomplete="current-password"
            >
        </div>

        <button type="submit" class="btn btn-primary btn-block">登 录</button>
    </form>
</div>
{% endblock %}
